<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width" initial-scale="1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>ProductHive | Home</title>
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
      <div class="container">
        <a href="index.html" class="navbar-brand">ProductHive</a>
        <ul class="navbar-nav">
          <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="products.html" class="nav-link">Products</a></li>
          <li class="nav-item"><a href="star-rated.html" class="nav-link">Star Rated</a></li>
        </ul>
      </div>
    </nav>
  </header>
  <main>
    <div class="container">
      <section class="mt-5">
        <h1 class="mb-5 text-center">Product Details</h2>
          <ul class="list-group">
            <li class="list-group-item">
              <p class="h5 mb-1 mt-1">ID: <span id="id"></span></p>
            </li>
            <li class="list-group-item">
              <p class="h5 mb-1 mt-1">Name: <span id="name"></span></p>
            </li>
            <li class="list-group-item">
              <p class="h5 mb-1 mt-1">Category: <span id="category"></span></p>
            </li>
            <li class="list-group-item">
              <p class="h5 mb-1 mt-1">Price: <span id="price"></span></p>
            </li>
            <li class="list-group-item">
              <p class="h5 mb-1 mt-1">Rating: <span id="rating"></span></p>
            </li>
          </ul>
      </section>
    </div>
  </main>
  <footer>
    <p class="text-center mt-5">&copy; 2026 ProductHive. All rights reserved.</p>
  </footer>
  <script>
    let id = new URL(window.location.href).searchParams.get("id");

    let products = [
      {
        id: "1",
        name: "Smart Watch",
        category: "Electronics",
        price: "₹2999",
        rating: "4.5 ⭐"
      },
      {
        id: "2",
        name: "Wireless Earbuds",
        category: "Accessories",
        price: "₹1999",
        rating: "4.2 ⭐"
      },
      {
        id: "3",
        name: "Gaming Mouse",
        category: "Gaming",
        price: "₹1499",
        rating: "4.6 ⭐"
      },
      {
        id: "4",
        name: "Bluetooth Speaker",
        category: "Audio",
        price: "₹2499",
        rating: "4.4 ⭐"
      }
    ];

    let product = products.find(p => p.id === id);

    document.getElementById("id").innerText = product.id;
    document.getElementById("name").innerText = product.name;
    document.getElementById("category").innerText = product.category;
    document.getElementById("price").innerText = product.price;
    document.getElementById("rating").innerText = product.rating;
  </script>
</body>

</html>
